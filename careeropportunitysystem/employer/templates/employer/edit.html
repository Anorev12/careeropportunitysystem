<div class="container" style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2>{{ title }}</h2>
    <hr>
    <form method="POST">
        {% csrf_token %} <div class="form-group">
            {{ form.as_p }} </div>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn apply" style="border:none; width: 100%; padding: 12px;">Save Job Posting</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="{% url 'employer_index' %}" style="color: #666; text-decoration: none;">← Back to Dashboard</a>
            </p>
        </div>
    </form>
</div>
