<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Career Opportunity System{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --cos-primary: #1a3c5e;
      --cos-accent:  #f4a623;
    }
    body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; }
    .navbar-brand span { color: var(--cos-accent); }
    .navbar { background: var(--cos-primary) !important; }
    .btn-cos { background: var(--cos-accent); color: #fff; border: none; }
    .btn-cos:hover { background: #d4891a; color: #fff; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .sidebar { min-height: calc(100vh - 56px); background: var(--cos-primary); }
    .sidebar .nav-link { color: rgba(255,255,255,.75); }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); border-radius: 6px; }
    .stat-card { border-left: 4px solid var(--cos-accent); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3">
  <a class="navbar-brand fw-bold" href="{% url 'accounts:index' %}">
    <i class="bi bi-briefcase-fill me-1"></i>Career<span>OS</span>
  </a>
  {% if user.is_authenticated %}
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small">{{ user.fullname }}</span>
    <a href="{% url 'accounts:logout' %}" class="btn btn-sm btn-outline-light">
      <i class="bi bi-box-arrow-right me-1"></i>Logout
    </a>
  </div>
  {% else %}
  <div class="d-flex gap-2">
    <a href="{% url 'accounts:login' %}"    class="btn btn-sm btn-outline-light">Login</a>
    <a href="{% url 'accounts:register' %}" class="btn btn-sm btn-cos">Register</a>
  </div>
  {% endif %}
</nav>

<!-- MESSAGES -->
{% if messages %}
<div class="container-fluid px-4 pt-2">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show mb-1" role="alert">
    {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>
{% endif %}

{% block body %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
