<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookmarks Login – Career Opportunity System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a3550 0%, #2d6a9f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .card-header { text-align: center; margin-bottom: 2rem; }
    .card-header .icon { font-size: 2.8rem; margin-bottom: 0.5rem; }
    .card-header h1 { font-size: 1.6rem; color: #1a3550; font-weight: 700; }
    .card-header p  { font-size: 0.9rem; color: #7a8fa6; margin-top: 0.3rem; }

    .messages { margin-bottom: 1.2rem; }
    .messages p {
      background: #ffe8e8;
      color: #c0392b;
      border-left: 4px solid #e74c3c;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 0.4rem;
    }

    .divider { border: none; border-top: 1px solid #e0e7ef; margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d0dce8;
      border-radius: 9px;
      font-size: 0.92rem;
      color: #1a3550;
      background: #f7fafd;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1a3550;
      box-shadow: 0 0 0 3px rgba(26,53,80,0.1);
      background: #fff;
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: #1a3550;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #24496e; }

    .bottom-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.88rem;
      color: #7a8fa6;
    }
    .bottom-link a { color: #1a3550; font-weight: 600; text-decoration: none; }
    .bottom-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="icon">🔖</div>
    <h1>Bookmarks Login</h1>
    <p>Sign in to view your saved jobs.</p>
  </div>

  {% if messages %}
    <div class="messages">
      {% for msg in messages %}
        <p>{{ msg }}</p>
      {% endfor %}
    </div>
  {% endif %}

  <hr class="divider">

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
  <label for="username">Username</label>
  <input type="text" id="username" name="username" placeholder="Enter your username" required>
</div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn-submit">Login</button>
  </form>

  <div class="bottom-link">
    <a href="/">← Back to Home</a>
  </div>
</div>

</body>
</html>
