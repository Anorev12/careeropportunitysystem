<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Applications{% endblock %} | Career Opportunity System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #222; min-height: 100vh; }

    /* ── Navbar ── */
    .navbar {
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .navbar .brand { color: #fff; font-size: 1.1rem; font-weight: 700; text-decoration: none; letter-spacing: .3px; }
    .navbar .nav-links a {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      margin-left: 1.4rem;
      font-size: .92rem;
      transition: color .2s;
    }
    .navbar .nav-links a:hover { color: #fff; }

    /* ── Page wrapper ── */
    .page { max-width: 960px; margin: 2.5rem auto; padding: 0 1.25rem 3rem; }

    /* ── Messages ── */
    .messages { margin-bottom: 1.25rem; }
    .msg {
      padding: .75rem 1.1rem;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: .5rem;
    }
    .msg-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .msg-error   { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .msg-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    .msg-info    { background: #cce5ff; color: #004085; border-left: 4px solid #007bff; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      padding: 1.75rem 1.75rem;
      margin-bottom: 1.25rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      padding-bottom: .9rem;
      border-bottom: 2px solid #e6edf5;
    }
    .card-header h2 { font-size: 1.2rem; color: #1a3c5e; font-weight: 700; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .25rem .7rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
    }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-reviewed  { background: #cce5ff; color: #004085; }
    .badge-accepted  { background: #d4edda; color: #155724; }
    .badge-rejected  { background: #f8d7da; color: #721c24; }
    .badge-withdrawn { background: #e2e3e5; color: #383d41; }
    .badge-passed    { background: #d4edda; color: #155724; }
    .badge-failed    { background: #f8d7da; color: #721c24; }
    .badge-no_show   { background: #e2e3e5; color: #383d41; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { background: #f0f4f8; color: #1a3c5e; font-weight: 700; padding: .75rem 1rem; text-align: left; }
    td { padding: .75rem 1rem; border-bottom: 1px solid #e9ecef; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafd; }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: .5rem 1.1rem;
      border-radius: 7px;
      font-size: .85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity .18s, transform .1s;
    }
    .btn:hover   { opacity: .88; }
    .btn:active  { transform: scale(.98); }
    .btn-primary { background: #1a3c5e; color: #fff; }
    .btn-blue    { background: #2196F3; color: #fff; }
    .btn-green   { background: #28a745; color: #fff; }
    .btn-orange  { background: #FF9800; color: #fff; }
    .btn-red     { background: #dc3545; color: #fff; }
    .btn-gray    { background: #6c757d; color: #fff; }
    .btn-sm      { padding: .35rem .8rem; font-size: .8rem; }

    /* ── Form ── */
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; color: #444; margin-bottom: .35rem; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: .65rem .95rem;
      border: 1.5px solid #cdd5df;
      border-radius: 8px;
      font-size: .9rem;
      color: #222;
      background: #fafbfc;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #2d6a9f;
      box-shadow: 0 0 0 3px rgba(45,106,159,.12);
      background: #fff;
    }
    .form-actions { display: flex; gap: .75rem; margin-top: 1.5rem; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 3.5rem 1rem; color: #999; }
    .empty .icon { font-size: 2.5rem; margin-bottom: .75rem; }

    /* ── Detail grid ── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .detail-item .label { font-size: .78rem; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: .4px; margin-bottom: .2rem; }
    .detail-item .value { font-size: .95rem; color: #222; }

    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
      .navbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="brand" href="{% url 'application_list' %}">&#128196; Applications</a>
  <div class="nav-links">
    <a href="{% url 'employer_index' %}">Jobs</a>
    <a href="{% url 'application_list' %}">My Applications</a>
    <a href="{% url 'logout' %}">Logout</a>
  </div>
</nav>

<div class="page">
  {% if messages %}
  <div class="messages">
    {% for message in messages %}
      <div class="msg msg-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
