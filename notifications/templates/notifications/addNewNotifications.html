<!DOCTYPE html>
<html>
<head>
    <title>Add New Notification</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
        .navbar { background: #1a3c5e; padding: 1rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; text-decoration: none; display: block; text-align: center; box-sizing: border-box; }
        .btn-primary { background: #1a3c5e; color: white; }
        .btn-secondary { background: #f0f4f8; color: #1a3c5e; border: 1.5px solid #1a3c5e; }
    </style>
</head>
<body>
<nav class="navbar">
    <span>🔔 Add New Notification</span>
    <div>
        <a href="{% url 'notifications:index' %}">Dashboard</a>
        <a href="{% url 'notifications:logout' %}">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2 style="color:#1a3c5e; margin-bottom:1.5rem;">Add New Notification</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label>Message Content</label>
                {{ form.message_content }}
            </div>
            <div class="field">
                <label>Message Content</label>
                {{ form.message_content }}
            </div>
            <button type="submit" class="btn btn-primary">Save Notification</button>
            <a href="{% url 'notifications:index' %}" class="btn btn-secondary" style="margin-top:0.5rem;">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
