<!DOCTYPE html>
<html lang="en">
<head>
    <title>Notifications - Career Opportunity System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }

        nav {
            background: #1a3c5e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .brand { color: white; font-size: 1.2rem; font-weight: 700; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
        nav a:hover { color: white; }

        .page-header {
            background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        .page-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .page-header p { font-size: 1rem; opacity: 0.85; }

        .section { max-width: 800px; margin: 50px auto; padding: 0 20px; }
        .section h2 {
            font-size: 1.4rem;
            color: #1a3c5e;
            margin-bottom: 24px;
            border-left: 4px solid #2d6a9f;
            padding-left: 12px;
        }

        .empty-box {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-top: 4px solid #c62828;
        }
        .empty-box .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-box h3 { font-size: 1.2rem; color: #1a3c5e; margin-bottom: 8px; }
        .empty-box p { color: #777; font-size: 0.9rem; }

        .back-btn {
            display: inline-block;
            margin-top: 24px;
            background: #1a3c5e;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        .back-btn:hover { background: #2d6a9f; }

        footer { text-align: center; padding: 30px; color: #999; font-size: 0.85rem; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <a class="brand" href="/">🏢 Career Opportunity System</a>
        <div>
            <a href="/accounts/login/">Login</a>
            <a href="/employer/register/">Register</a>
            <a href="/admin/">Admin</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>🔔 Notifications</h1>
        <p>Stay updated with the latest system alerts.</p>
    </div>

    <div class="section">
        <h2>Your Notifications</h2>
        <div class="empty-box">
            <div class="icon">🔔</div>
            <h3>No Notifications Yet</h3>
            <p>You have no notifications at the moment. Check back later!</p>
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <footer>
        &copy; 2025 Career Opportunity System — All rights reserved.
    </footer>

</body>
</html>
