<!DOCTYPE html>
<html>
<head>
    <title>Notifications Login</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a3c5e; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; }
        h2 { color: #1a3c5e; margin-bottom: 1.5rem; text-align: center; }
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #1a3c5e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        .error { background: #fff5f5; border: 1px solid #fca5a5; color: #c0392b; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔔 Notifications Login</h2>
    {% if messages %}
        {% for message in messages %}
        <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required />
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
</div>
</body>
</html>
