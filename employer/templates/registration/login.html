<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="max-width:400px;margin:80px auto;background:white;padding:30px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,.1)">
    <h2>Employer Login</h2>
    <hr>

    {% if messages %}
        {% for msg in messages %}
            <p style="background:#fff3cd;padding:10px;border-radius:4px;border-left:4px solid #ffc107">{{ msg }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width:100%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:4px;cursor:pointer;margin-top:10px">
            Log In
        </button>
    </form>

    <p style="text-align:center;margin-top:15px;color:#666">
        Don't have an account? Ask your admin to create one for you.
    </p>
</div>
</body>
</html>
