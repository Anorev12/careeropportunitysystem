<!DOCTYPE html>
<html>
<head><title>{{ title }}</title></head>
<body>
<div style="max-width:600px;margin:60px auto;background:white;padding:30px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,.1)">
    <h2>{{ title }}</h2>
    <hr>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding:12px 24px;background:#4CAF50;color:white;border:none;border-radius:4px;cursor:pointer">
            Save
        </button>
        <a href="{% url 'employer:employer_index' %}" style="margin-left:10px;color:#666">Cancel</a>
    </form>
</div>
</body>
</html>
