<!DOCTYPE html>
<html>
<head><title>Employer Register</title></head>
<body>
<div style="max-width:500px;margin:60px auto;background:white;padding:30px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,.1)">
    <h2>Create Employer Account</h2>
    <hr>
    {% if messages %}
        {% for msg in messages %}
            <p style="color:red">{{ msg }}</p>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width:100%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:4px;cursor:pointer;margin-top:10px">
            Register
        </button>
    </form>
    <p style="text-align:center;margin-top:15px">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
</body>
</html>
