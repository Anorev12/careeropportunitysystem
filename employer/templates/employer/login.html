<!DOCTYPE html>
<html>
<head><title>Employer Login</title></head>
<body>
<div style="max-width:400px;margin:80px auto;background:white;padding:30px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,.1)">
    <h2>Employer Login</h2>
    <hr>
    {% if messages %}
        {% for msg in messages %}
            <p style="color:red">{{ msg }}</p>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <p>
            <label>Username</label><br>
            <input type="text" name="username" style="width:100%;padding:8px;margin-top:4px">
        </p>
        <p>
            <label>Password</label><br>
            <input type="password" name="password" style="width:100%;padding:8px;margin-top:4px">
        </p>
        <button type="submit" style="width:100%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:4px;cursor:pointer">
            Log In
        </button>
    </form>
    <p style="text-align:center;margin-top:15px">
        No account? <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
</body>
</html>
