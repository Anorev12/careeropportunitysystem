
<style>
  body { background: #e8edf3; }

  .login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 120px);
    padding: 2rem 1rem;
  }
  .login-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    padding: 2.5rem 2.25rem;
    width: 100%;
    max-width: 420px;
  }
  .login-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .login-header .logo {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .login-header h2 {
    font-size: 1.4rem;
    color: #1a3c5e;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .login-header p {
    font-size: 0.85rem;
    color: #888;
  }

  .form-group {
    margin-bottom: 1.25rem;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 0.4rem;
  }
  .form-group input {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1.5px solid #cdd5df;
    border-radius: 8px;
    font-size: 0.95rem;
    color: #222;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafbfc;
  }
  .form-group input:focus {
    border-color: #2d6a9f;
    box-shadow: 0 0 0 3px rgba(45,106,159,0.12);
    background: #fff;
  }

  .btn-login {
    width: 100%;
    padding: 0.8rem;
    background: #1a3c5e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-login:hover   { background: #2d6a9f; }
  .btn-login:active  { transform: scale(0.99); }

  .divider {
    text-align: center;
    margin: 1.25rem 0 0;
    font-size: 0.82rem;
    color: #999;
  }

  /* Override container padding for the login layout */
  .container { padding: 0; }
</style>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <div class="logo">&#128188;</div>
      <h2>Career Opportunity System</h2>
      <p>Sign in to your account to continue</p>
    </div>

    <form method="POST" action="{% url 'login' %}">


      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your valid email address"
          value=""
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <p class="divider">Career Opportunity System &copy; 2025</p>
  </div>
</div>
